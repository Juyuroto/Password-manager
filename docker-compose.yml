services:
  go-app:
    container_name: go-app
    image: francescoxx/go-app:1.0.1
    build: ./backend
    environment:
      DATABASE_URL: "host=go_db user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-postgres} sslmode=disable"
      PORT: "${BACKEND_PORT:-8000}"
      APP_LOGIN_PASSWORD: "${APP_LOGIN_PASSWORD:-lockbox123}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      go_db:
        condition: service_healthy

  frontend:
    container_name: password-frontend
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    depends_on:
      - go-app

  go_db:
    container_name: go_db
    image: postgres:${POSTGRES_VERSION:-12}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:  
  pgdata: {}